{% extends "base.html" %}
{% block title %}概览 · 资源库后台{% endblock %}
{% block content %}
<h1>概览</h1>
<p class="toolbar">
  <button type="button" id="btn-sync-local" class="primary">同步本地 data/ 到数据库</button>
  <span class="muted">扫描已下载视频并更新资源库</span>
</p>

<h2>视频库 <a class="section-link" href="/videos">查看全部 →</a></h2>
<section class="cards">
  {% for s in dl_order %}
  <a class="card" href="/videos?download_status={{ s }}">
    <div class="card-num">{{ dl_counts[s] }}</div>
    <div class="card-label">{{ dl_labels[s] }}</div>
  </a>
  {% endfor %}
</section>

{% endblock %}
