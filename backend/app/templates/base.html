<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}资源库后台{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v=18">
</head>
<body class="page-{{ active|default('') }}">
  <nav class="topbar">
    <span class="brand">资源库后台</span>
    <a href="/" class="{{ 'on' if active=='dashboard' }}">概览</a>
    <a href="/videos" class="{{ 'on' if active=='resources' }}">视频库</a>
    <a href="/browse" class="{{ 'on' if active=='browse' }}">分类浏览</a>
    <a href="/category-editor" class="{{ 'on' if active=='category-editor' }}">分类编辑</a>
    <a href="/docs" class="right" target="_blank">API 文档</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% if poll_downloads is defined and poll_downloads %}<script>window.__POLL_DOWNLOADS__ = true;</script>{% endif %}
  <script src="/static/app.js?v=14"></script>
</body>
</html>
